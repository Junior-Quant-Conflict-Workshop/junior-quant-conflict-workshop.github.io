<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schedule - Junior Scholars in Quantitative Conflict Workshop</title>
  <meta name="description" content="Upcoming sessions of the Junior Scholars in Quantitative Conflict Workshop.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊️</text></svg>">
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #ffffff;
      color: #000000;
      line-height: 1.4;
      font-size: 16px;
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      border-bottom: 1px solid #ccc;
      padding: 10px 0;
      font-size: 15px;
    }

    nav a {
      margin: 5px 15px;
      text-decoration: none;
      color: #808080;
      padding-bottom: 5px;
      font-weight: normal;
      font-size: 18px;
    }

    nav a:hover,
    nav a.active {
      border-bottom: 2px solid #3B739E;
      color: #3B739E;
      font-weight: bold;
    }

    .container {
      display: flex;
      justify-content: center;
      width: 100%;
      margin: 50px auto;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .right {
      max-width: 800px;
      width: 100%;
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      margin-top: 0;
      margin-bottom: 30px;
    }

    .session {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      border-top: 4px solid #3B739E; /* match menu highlight */
      padding: 20px 0;
    }

    .session:last-child {
      border-bottom: 4px solid #3B739E; /* match menu highlight */
    }

    .date {
      width: 30%;
      font-weight: bold;
      font-size: 16px;
      color: #000000;
    }

    .info {
      width: 65%;
      font-size: 16px;
      color: #000000;
    }

    .info h2 {
      font-size: 18px;
      margin: 0 0 5px 0;
      font-weight: bold;
    }

    .info em {
      font-style: italic;
      display: block;
      margin: 5px 0;
    }

    .info p {
      margin: 5px 0;
    }

    .announcement {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin: 40px 0;
    }

    footer {
      text-align: center;
      font-size: 11px;
      margin-top: 40px;
      color: #999;
    }

    @media (max-width: 600px) {
      .container {
        flex-direction: column;
        align-items: center;
        margin: 20px auto;
        padding: 0 15px;
      }

      .right {
        width: 100%;
        padding: 0;
        margin: 20px 0;
        text-align: left;
      }

      nav {
        font-size: 14px;
      }

      nav a {
        margin: 5px 10px;
      }

      h1 {
        font-size: 24px;
      }

      .session {
        flex-direction: column;
      }

      .date,
      .info {
        width: 100%;
      }

      .date {
        margin-bottom: 10px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">About</a>
    <a href="organizers.html">Organizers</a>
    <a href="proposal.html">Proposal Submissions</a>
    <a href="schedule.html" class="active">Schedule</a>
    <a href="past-presentations.html">Past Presentations</a>
    <a href="subscribe.html">Subscribe</a>
  </nav>

  <div class="container">
    <div class="right">
      <div class="announcement">
        We'll be back soon with our Fall 2026 schedule!
      </div>

    </div>
  </div>

  <footer>
    &copy; 2026 Junior Scholars in Quantitative Conflict Workshop
  </footer>

</body>
</html>
